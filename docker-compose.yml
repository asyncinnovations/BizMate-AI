  bizmate-backend:
    build: ./Server
    container_name: bizmate-backend
    restart: always
    environment:
      # DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@bizmate-db:5432/${DB_NAME}
      PORT: 4040
    # depends_on:
    #   - bizmate-db
    ports:
      - "4040:4040"
    networks:
      - bizmate-net

  bizmate-frontend:
    build: ./Client
    container_name: bizmate-frontend
    restart: always
    environment:
      # NEXT_PUBLIC_API_URL: http://localhost:4040
      PORT: 3000
    depends_on:
      - bizmate-backend
    ports:
      - "3001:3000"
    networks:
      - bizmate-net

volumes:
  bizmate_data:

networks:
  bizmate-net:
    driver: bridge
