version: '3.8'

services:
  backend:
    build: ./server
    container_name: bizmate-backend
    restart: always
    env_file:
      - ./server/.env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - bizmate_net
    ports:
      - "4040:4040"  # Backend API access
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./client
    container_name: bizmate-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - bizmate_net
    ports:
      - "3000:3000"   # Frontend access
    volumes:
      - ./client/dist:/usr/share/nginx/html
    image: nginx:alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  database:
    image: postgres:16
    container_name: bizmate-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_2025
      POSTGRES_DB: bizmate_db
    volumes:
      - ./public/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata_bizmate:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bizmate_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizmate_net
    ports:
      - "5434:5432"  # Only needed if you want host/PGAdmin access

volumes:
  pgdata_bizmate:

networks:
  bizmate_net:
    driver: bridge